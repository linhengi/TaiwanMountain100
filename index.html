.root{min-height:100vh;background:linear-gradient(178deg,#f4f8f5 0%,#eff5f1 45%,#ffffff 100%);color:#1c2b22;font-family:'Noto Sans TC','PingFang TC','Microsoft JhengHei',system-ui,sans-serif;font-size:14px}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input{font-family:inherit}

/* header */
.hd{display:flex;align-items:center;justify-content:space-between;gap:16px;padding:14px 22px;border-bottom:1px solid #dbe6de;flex-wrap:wrap;position:sticky;top:0;background:rgba(247,251,248,.9);backdrop-filter:blur(8px);z-index:20}
.hd-l{display:flex;align-items:center;gap:14px}
.hd h1{font-size:22px;letter-spacing:6px;font-weight:800}
.hd-sub{color:#5b7565;font-size:12px;letter-spacing:1px;margin-top:2px}
.ring{width:48px;height:48px}
.ring-bg{fill:none;stroke:#dbe6de;stroke-width:4}
.ring-fg{fill:none;stroke:#e09a24;stroke-width:4;stroke-linecap:round;transform:rotate(-90deg);transform-origin:50% 50%;transition:stroke-dashoffset .5s}
.ring-t{fill:#e09a24;font-size:14px;font-weight:800}
.tabs{display:flex;gap:6px;flex-wrap:wrap}
.tab{padding:8px 15px;border-radius:20px;border:1px solid #c9d9ce;color:#48644f;font-size:13px;transition:.15s}
.tab:hover{border-color:#8fb39d;color:#1c2b22}
.tab.on{background:#e09a24;border-color:#e09a24;color:#241a06;font-weight:700}

/* map layout */
.mv{display:grid;grid-template-columns:1fr 330px;gap:0;height:calc(100vh - 78px)}
.mv.has-d{grid-template-columns:1fr 360px 330px}
@media(max-width:1100px){.mv,.mv.has-d{grid-template-columns:1fr 300px;height:auto}.detail{position:fixed;right:12px;bottom:12px;top:auto;max-height:70vh;width:min(380px,92vw);z-index:30;box-shadow:0 12px 40px rgba(30,50,40,.18)}}
@media(max-width:760px){.mv{display:block;height:auto}.side{max-height:40vh}.mapwrap{height:60vh}}

.side{border-left:1px solid #dbe6de;display:flex;flex-direction:column;min-height:0}
.srch{margin:12px 12px 8px;padding:9px 12px;border-radius:9px;border:1px solid #c9d9ce;background:#ffffff;color:#1c2b22;outline:none;font-size:13px}
.srch:focus{border-color:#e09a24}
.filters{padding:0 12px 6px;display:flex;flex-direction:column;gap:5px}
.frow{display:flex;align-items:center;gap:4px;flex-wrap:wrap}
.flb{color:#71887a;font-size:11px;width:28px;flex:none}
.fbtn{padding:3px 9px;border-radius:12px;border:1px solid #c9d9ce;color:#48644f;font-size:11.5px}
.fbtn.on{background:#35594a;color:#fff;border-color:#35594a;font-weight:700}
.cnt{padding:4px 14px;color:#71887a;font-size:11px;display:flex;align-items:center;justify-content:space-between}
.plist{overflow-y:auto;flex:1;min-height:0}
.prow{display:flex;align-items:center;gap:7px;padding:7px 12px;cursor:pointer;border-left:3px solid transparent;transition:.12s}
.prow:hover{background:#f1f6f2}
.prow.on{background:#e7efe9;border-left-color:#e09a24}
.dot{width:9px;height:9px;border-radius:50%;flex:none}
.prk{color:#71887a;font-size:10.5px;width:30px;flex:none;font-variant-numeric:tabular-nums}
.pn{flex:1;font-size:13.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pe{color:#5b7565;font-size:11.5px;font-variant-numeric:tabular-nums}
.pg{font-size:11px;font-weight:800;width:20px;text-align:center}
.marks{display:flex;gap:3px}
.mk{width:20px;height:20px;border-radius:50%;border:1px solid #c9d9ce;color:#87a091;font-size:10px;line-height:1;display:flex;align-items:center;justify-content:center}
.mk.c{background:#e09a24;border-color:#e09a24;color:#241a06}
.mk.w{background:#d1476b;border-color:#d1476b;color:#fff}
.mk.p{background:#3480c4;border-color:#3480c4;color:#fff}

.mapwrap{position:relative;padding:10px;min-height:0}
.twmap{width:100%;height:100%;display:block}
.island{fill:#dceadf;stroke:#a9c4b2;stroke-width:1.1}
.pk{cursor:pointer}
.pk.dim{opacity:.14;pointer-events:none}
.pk circle{transition:.15s}
.pk:hover circle{stroke:#fff;stroke-width:1.4}
.pklb{fill:#8a5f0e;font-size:11px;text-anchor:middle;font-weight:700;paint-order:stroke;stroke:#f4f8f5;stroke-width:3px}
.legend{position:absolute;left:16px;bottom:14px;display:flex;flex-direction:column;gap:5px;font-size:11.5px;color:#48644f;background:rgba(255,255,255,.85);padding:9px 12px;border-radius:9px;border:1px solid #dbe6de}
.legend span{display:flex;align-items:center;gap:6px}
.legend i{width:9px;height:9px;border-radius:50%;display:inline-block}
.legend .lgc{background:#2d6a4f;border:2px solid #e09a24;width:7px;height:7px}

/* detail */
.detail{border-left:1px solid #dbe6de;border-right:1px solid #dbe6de;padding:18px;overflow-y:auto;position:relative;background:#fcfdfc}
.dx{position:absolute;top:12px;right:12px;width:26px;height:26px;border-radius:50%;border:1px solid #c9d9ce;color:#5b7565}
.dx:hover{border-color:#d64545;color:#d64545}
.d-eyebrow{font-size:11.5px;letter-spacing:2px;font-weight:700}
.d-name{font-size:30px;letter-spacing:3px;margin:2px 0 0;font-weight:900}
.d-ele{font-family:Georgia,'Times New Roman',serif;font-size:40px;color:#e09a24;line-height:1.1;font-variant-numeric:tabular-nums}
.d-ele small{font-size:16px;color:#b3821f}
.d-badges{display:flex;flex-wrap:wrap;gap:5px;margin:10px 0 12px}
.bg{padding:3px 9px;border-radius:11px;font-size:11px;font-weight:700;color:#fff}
.bg.bd{background:#48644f}
.bg.bp{background:#3c8fd0}
.bg.bx{background:#d64545;color:#fff}
.bg.bc{background:transparent;border:1px solid #d9a43c;color:#a5730f}
.d-grid{display:grid;grid-template-columns:1fr;gap:8px;font-size:13px;line-height:1.45}
.d-grid label{display:block;color:#71887a;font-size:10.5px;letter-spacing:1.5px;margin-bottom:1px}
.d-acts{display:flex;flex-direction:column;gap:6px;margin-top:14px}
.act{padding:9px;border-radius:9px;border:1px solid #c9d9ce;color:#2c4436;font-size:13px;text-align:center;transition:.15s}
.act:hover{border-color:#8fb39d}
.act.on-c{background:#e09a24;border-color:#e09a24;color:#241a06;font-weight:800}
.act.on-w{background:#d1476b;border-color:#d1476b;color:#fff;font-weight:800}
.act.on-p{background:#3480c4;border-color:#3480c4;color:#fff;font-weight:800}
.d-date{margin-top:9px;font-size:12.5px;color:#48644f}
.d-date input{background:#ffffff;border:1px solid #c9d9ce;color:#1c2b22;border-radius:7px;padding:5px 8px;margin-left:4px}

/* weather */
.wx{margin-top:14px;border:1px solid #c9d9ce;border-radius:11px;padding:11px;background:#ffffff}
.wx-load,.wx-err{color:#5b7565;font-size:12.5px}
.wx-err{color:#b96a6a}
.wx-now{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap}
.wx-t{font-size:26px;font-weight:800;color:#3c8fd0;font-variant-numeric:tabular-nums}
.wx-d{font-size:14px}
.wx-w,.wx-p{color:#5b7565;font-size:12px}
.wx-days{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:9px}
.wx-day{display:flex;flex-direction:column;gap:2px;align-items:center;background:#eff5f1;border-radius:8px;padding:7px 4px;font-size:11.5px}
.wx-pp{color:#3c8fd0}
.wx-src{margin-top:8px;color:#87a091;font-size:10px;letter-spacing:.5px}

/* panes */
.pane{padding:20px 24px;max-width:1160px;margin:0 auto}
.pane-hd{display:flex;align-items:baseline;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.pane-hd h2{font-size:20px;letter-spacing:3px}
.pane-hd span{color:#71887a;font-size:12.5px}
.clr{margin-left:auto;padding:6px 14px;border-radius:16px;border:1px solid #d64545;color:#d64545;font-size:12px}
.clr:hover{background:#d64545;color:#fff}
.empty{color:#5b7565;background:#ffffff;border:1px dashed #c9d9ce;border-radius:11px;padding:26px;text-align:center;font-size:13.5px;line-height:1.7}

/* categories */
.catgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:12px;overflow-y:auto;min-height:0;padding-right:6px;align-content:start}
.catcard{box-shadow:0 1px 4px rgba(30,50,40,.06);border:1px solid #dbe6de;border-radius:13px;padding:14px 15px;background:#ffffff}
.cat-hd{display:flex;align-items:center;justify-content:space-between}
.cat-hd h3{font-size:17px;letter-spacing:3px;color:#e09a24}
.cat-pg{font-size:12px;color:#5b7565;font-variant-numeric:tabular-nums}
.cat-pg.full{color:#e09a24;font-weight:800}
.cat-ds{color:#71887a;font-size:11.5px;margin:3px 0 9px}
.cat-chips{display:flex;flex-wrap:wrap;gap:5px}
.chip{padding:4px 10px;border-radius:13px;border:1px solid #c9d9ce;color:#2c4436;font-size:12px;transition:.12s}
.chip:hover{border-color:#e09a24;color:#e09a24}
.chip.done{background:#e09a24;border-color:#e09a24;color:#241a06;font-weight:700}

/* rank */
.rkgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:12px}
.rkcard{border:1px solid #dbe6de;border-radius:13px;padding:13px 14px;background:#ffffff}
.rkcard h3{font-size:14.5px;letter-spacing:1.5px;margin-bottom:9px;color:#2c4436}
.rkrow{display:flex;align-items:center;gap:8px;width:100%;padding:5px 4px;border-radius:7px;font-size:13px;text-align:left}
.rkrow:hover{background:#e7efe9}
.rkn{width:20px;text-align:center;color:#71887a;font-size:11.5px;font-variant-numeric:tabular-nums}
.rkn.top{color:#e09a24;font-weight:800}
.rkrow i{width:8px;height:8px;border-radius:50%;flex:none}
.rk-nm{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rk-v{color:#5b7565;font-size:11.5px;font-variant-numeric:tabular-nums}

/* done / wish */
.prg-wrap{display:flex;flex-direction:column;gap:7px;margin-bottom:16px;max-width:560px}
.prg{display:flex;align-items:center;gap:10px}
.prg-lb{display:flex;align-items:center;gap:6px;width:96px;font-size:12.5px;color:#2c4436}
.prg-lb i{width:8px;height:8px;border-radius:50%}
.prg-bar{flex:1;height:8px;border-radius:5px;background:#eaf1ec;overflow:hidden}
.prg-bar div{height:100%;border-radius:5px;transition:width .4s}
.prg-v{width:46px;text-align:right;font-size:12px;color:#5b7565;font-variant-numeric:tabular-nums}
.drows{display:flex;flex-direction:column;gap:6px}
.drow{display:flex;align-items:center;gap:10px;border:1px solid #dbe6de;border-radius:10px;padding:8px 12px;background:#ffffff;flex-wrap:wrap}
.rm{width:22px;height:22px;border-radius:50%;border:1px solid #c9d9ce;color:#5b7565;font-size:11px;flex:none;display:flex;align-items:center;justify-content:center}
.rm:hover{border-color:#d64545;color:#d64545}
.drow-n{font-size:14px;font-weight:600;text-align:left}
.drow-n:hover{color:#e09a24}
.drow-e{color:#5b7565;font-size:12px}
.drow-r{margin-left:auto;color:#71887a;font-size:12px}
.drow input{margin-left:auto;background:#eff5f1;border:1px solid #c9d9ce;color:#1c2b22;border-radius:7px;padding:4px 8px;font-size:12px}

/* compare */
.cmp-scroll{overflow-x:auto}
.cmpt{border-collapse:collapse;min-width:640px;width:100%}
.cmpt th,.cmpt td{padding:9px 12px;border-bottom:1px solid #dbe6de;font-size:13px;text-align:left;vertical-align:top;line-height:1.5}
.cmp-lb{color:#71887a;font-size:11.5px;white-space:nowrap;letter-spacing:1px}
.cmp-nm{display:block;font-size:16px;font-weight:800;border-top:3px solid;padding-top:7px;letter-spacing:1px}
.cmp-nm:hover{color:#e09a24}
.cmp-x{color:#5b7565;font-size:11px;margin-top:3px}
.cmp-x:hover{color:#d64545}
@media(prefers-reduced-motion:reduce){*{transition:none!important}}

/* \u7D93\u5178\u5206\u985E\uFF0B\u5730\u5716 */
.pane-w{max-width:1400px}
.cv{display:grid;grid-template-columns:minmax(300px,400px) 1fr;gap:18px;align-items:stretch;height:calc(100vh - 165px);min-height:420px}
.cv-map{border:1px solid #dbe6de;border-radius:14px;background:#ffffff;padding:10px 8px 6px;display:flex;flex-direction:column;min-height:0}
.cv-map .zwrap{flex:1;min-height:0}

.cv-cap{padding:8px 10px 6px;font-size:12px;color:#5b7565;border-top:1px solid #e3ece6;margin-top:4px}
.cv-cap b{color:#e09a24;letter-spacing:2px;margin-right:8px}
.catcard{cursor:pointer;transition:border-color .15s}
.catcard:hover{border-color:#a9c4b2}
.catcard.on{border-color:#e09a24;box-shadow:0 0 0 1px #e09a2455}
.pklb.sm{font-size:7.5px;stroke-width:2.2px}
@media(max-width:900px){.cv{display:block;height:auto}.cv-map{margin-bottom:14px}.cv-map .zwrap{height:52vh}.catgrid{overflow:visible;padding-right:0}}

/* \u7E2E\u653E\u63A7\u5236 */
.zwrap{position:relative;width:100%;height:100%;display:flex;align-items:center;justify-content:center;overflow:hidden}
.zbtns{position:absolute;top:10px;right:10px;display:flex;flex-direction:column;gap:6px}
.zbtns button{width:30px;height:30px;border-radius:8px;border:1px solid #a9c4b2;background:#ffffff;color:#2c4436;font-size:15px;line-height:1;cursor:pointer;transition:.12s}
.zbtns button:hover{border-color:#e09a24;color:#e09a24}
